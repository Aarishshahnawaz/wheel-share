name: WheelShare CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: wheelshare-cluster
  DOCKER_USERNAME: aarish098

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./wheelshare-server
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/wheelshare-server:latest
          ${{ env.DOCKER_USERNAME }}/wheelshare-server:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./wheelshare-client
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/wheelshare-client:latest
          ${{ env.DOCKER_USERNAME }}/wheelshare-client:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.0'

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/secrets.yaml
        kubectl apply -f k8s/mongo-pvc.yaml
        kubectl apply -f k8s/mongo-deployment.yaml
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        
    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/wheelshare-server --timeout=5m
        kubectl rollout status deployment/wheelshare-client --timeout=5m

    - name: Deploy Monitoring Stack
      run: |
        kubectl apply -f k8s/prometheus-config.yaml
        kubectl apply -f k8s/prometheus-deployment.yaml
        kubectl apply -f k8s/grafana-datasource.yaml
        kubectl apply -f k8s/grafana-deployment.yaml

    - name: Get LoadBalancer URLs
      run: |
        echo "=== Frontend URL ==="
        kubectl get service wheelshare-client-service
        echo ""
        echo "=== Grafana URL ==="
        kubectl get service grafana-service
        echo ""
        echo "=== Prometheus URL ==="
        kubectl get service prometheus-service

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: |
        cd wheelshare-server
        npm install

    - name: Run backend tests
      run: |
        cd wheelshare-server
        npm test || echo "No tests configured"

    - name: Install frontend dependencies
      run: |
        cd wheelshare-client
        npm install

    - name: Run frontend tests
      run: |
        cd wheelshare-client
        npm test || echo "No tests configured"
