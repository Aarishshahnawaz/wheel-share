apiVersion: apps/v1
kind: Deployment
metadata:
  name: wheelshare-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wheelshare-server
  template:
    metadata:
      labels:
        app: wheelshare-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: wheelshare-server
        image: aarish098/wheelshare-server:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: wheelshare-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: wheelshare-secrets
              key: JWT_SECRET
        - name: ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: wheelshare-secrets
              key: ADMIN_SECRET
        - name: ALLOWED_ORIGINS
          value: "http://54.237.196.65,http://54.237.196.65:80"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wheelshare-server-service
spec:
  selector:
    app: wheelshare-server
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
