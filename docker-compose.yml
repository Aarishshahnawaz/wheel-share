version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: wheelshare-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  wheelshare-server:
    build: ./wheelshare-server
    container_name: wheelshare-server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/wheelshare
      - JWT_SECRET=your_jwt_secret_here
      - PORT=5000
    depends_on:
      - mongo

  wheelshare-client:
    build: ./wheelshare-client
    container_name: wheelshare-client
    ports:
      - "80:80"
    depends_on:
      - wheelshare-server

volumes:
  mongo_data:
